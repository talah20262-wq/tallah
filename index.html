<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tallah Smart System | نظام طلة للأتمتة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root { --main: #000; --bg: #f5f1ed; --card: #fff; }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
        body{background:var(--bg); color:#111; min-height:100vh;}
        header{background:var(--main); padding:25px; text-align:center; color:#fff; box-shadow:0 10px 30px rgba(0,0,0,.1);}
        .container{width:95%; max-width:900px; margin:auto; padding:20px;}
        .card{background:var(--card); padding:30px; border-radius:25px; box-shadow:0 10px 40px rgba(0,0,0,.05); margin-bottom:20px;}
        .title{font-size:28px; font-weight:900; margin-bottom:15px; border-right:5px solid var(--main); padding-right:15px;}
        input, select, button, textarea{width:100%; padding:15px; border-radius:15px; border:1px solid #ddd; margin-top:12px; font-size:16px; outline:none;}
        button{background:var(--main); color:#fff; font-weight:800; cursor:pointer; border:none; transition:0.3s;}
        button:hover{opacity:0.8; transform:translateY(-2px);}
        .hidden{display:none;}
        .pdf-area{background:#f9f9f9; border:2px dashed #ccc; padding:25px; border-radius:20px; text-align:center; margin-top:20px;}
        .log{background:#111; color:#0f0; padding:15px; border-radius:15px; height:180px; overflow-y:auto; font-family:monospace; font-size:13px; margin-top:15px; direction:ltr; text-align:left;}
        .success-tag{color:#27ae60; font-weight:bold;}
    </style>
</head>
<body>

<header>
    <h1 style="letter-spacing:4px;">TALLAH</h1>
    <p>النظام الذكي لمعالجة بوالص ABS</p>
</header>

<div class="container">
    <div id="loginBox" class="card">
        <div class="title">دخول النظام</div>
        <input type="text" id="loginInput" placeholder="ادخل رقم الهاتف للتتبع أو كود الإدارة">
        <button onclick="handleLogin()">دخول</button>
    </div>

    <div id="adminPage" class="card hidden">
        <div class="title">معالجة بوالص الشحن (PDF)</div>
        <p style="font-size:14px; color:#666;">ارفع ملف الـ PDF المستخرج من شركة ABS وسيقوم النظام بسحب البيانات فوراً.</p>
        
        <div class="pdf-area">
            <input type="file" id="pdfFile" accept=".pdf" style="border:none; background:none;">
            <button onclick="startAutoProcess()" style="background:#27ae60; margin-top:15px;">بدء الاستخراج والحفظ التلقائي</button>
        </div>

        <div id="processLog" class="log">في انتظار رفع الملف...</div>
        
        <button onclick="location.reload()" style="background:#666; margin-top:20px;">تسجيل الخروج</button>
    </div>

    <div id="userPage" class="card hidden">
        <div class="title">حالة شحنتك</div>
        <div id="userResult"></div>
        <button onclick="location.reload()" style="background:#666; margin-top:20px;">رجوع</button>
    </div>
</div>

<script>
// إعدادات Firebase الخاصة بمشروعك
const firebaseConfig = {
    apiKey: "AIzaSyAFUX5NmGFR9MLFzjIa-MkBUOk6OMz5Low",
    authDomain: "tatpo-c40ce.firebaseapp.com",
    databaseURL: "https://tatpo-c40ce-default-rtdb.firebaseio.com",
    projectId: "tatpo-c40ce",
    storageBucket: "tatpo-c40ce.appspot.com",
    messagingSenderId: "916778556013",
    appId: "1:916778556013:web:dfdfd7c79fbdf9f334472"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ADMIN_CODE = "2009257";
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

function handleLogin() {
    const val = document.getElementById("loginInput").value.trim();
    if(val === ADMIN_CODE) {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("adminPage").classList.remove("hidden");
    } else if(val !== "") {
        checkStatus(val);
    }
}

function checkStatus(phone) {
    db.ref("shipments/" + phone).once("value").then(snapshot => {
        if(snapshot.exists()) {
            const d = snapshot.val();
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("userPage").classList.remove("hidden");
            document.getElementById("userResult").innerHTML = `
                <div style="line-height:2;">
                    <p><b>أهلاً:</b> ${d.name}</p>
                    <p><b>قيمة الطلب:</b> ${d.price} ج.م</p>
                    <p><b>الحالة:</b> <span style="color:blue; font-weight:bold;">${d.status}</span></p>
                    <p style="font-size:14px; color:#777; margin-top:10px;">تم تحديث البيانات تلقائياً من بوليصة الشحن.</p>
                </div>`;
        } else { alert("لا توجد شحنة مسجلة لهذا الرقم."); }
    });
}

// دالة معالجة الـ PDF المخصصة لشركة ABS
async function startAutoProcess() {
    const fileInput = document.getElementById("pdfFile");
    const log = document.getElementById("processLog");
    if(!fileInput.files[0]) return alert("يرجى اختيار ملف PDF أولاً");

    log.innerHTML = "> بدء قراءة ملف ABS...<br>";
    const file = fileInput.files[0];
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
    
    log.innerHTML += `> عدد الصفحات: ${pdf.numPages}<br>`;

    for(let i=1; i<=pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const textItems = textContent.items.map(item => item.str);
        const fullText = textItems.join(" ");

        // استخراج البيانات بناءً على شكل البوليصة المرفقة
        // 1. استخراج رقم الهاتف (يبدأ بـ 01)
        const phoneMatch = fullText.match(/01[0125][0-9]{8}/);
        const phone = phoneMatch ? phoneMatch[0] : null;

        // 2. استخراج السعر (COD) - عادة يأتي بجانب كلمة COD أو أرقام كبيرة
        const priceMatch = fullText.match(/COD\s*(\d+)/i) || fullText.match(/(\d{3,4})\s*750/); // 750 ظهرت في صورتك
        const price = priceMatch ? priceMatch[1] : "غير محدد";

        // 3. استخراج الاسم (يأتي عادة بعد Ref To:)
        const nameMatch = fullText.match(/To\s*:\s*([\u0600-\u06FF\s]+)/);
        const name = nameMatch ? nameMatch[1].trim() : "عميل طلة";

        if(phone) {
            log.innerHTML += `> تم اكتشاف: <span class="success-tag">${name}</span> | رقم: ${phone}<br>`;
            
            // حفظ في Firebase
            await db.ref("shipments/" + phone).update({
                name: name,
                price: price,
                status: "تم التأكيد في شركة الشحن",
                details: "تم الاستخراج من بوليصة ABS تلقائياً",
                lastUpdate: new Date().toLocaleString('ar-EG')
            });
        }
    }
    log.innerHTML += "> <span class='success-tag'>✓ اكتملت العملية بنجاح!</span>";
    alert("تم سحب كافة البيانات وحفظها في قاعدة البيانات.");
}
</script>
</body>
</html>
