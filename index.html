<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitleTag">Tallah Smart System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>
        :root { --main: #000; --bg: #f5f1ed; --card: #fff; }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
        body{background:var(--bg); color:#111; min-height:100vh;}
        header{background:var(--main); padding:20px; text-align:center; color:#fff;}
        .logo-container{display:flex; align-items:center; justify-content:center; gap:10px;}
        #siteLogoImg{width:50px; border-radius:50%; display:none;}
        .verified-badge{color:#1da1f2; font-size:20px;}
        .container{width:95%; max-width:900px; margin:auto; padding:20px;}
        .card{background:var(--card); padding:25px; border-radius:25px; box-shadow:0 10px 40px rgba(0,0,0,.05); margin-bottom:20px;}
        input, select, button, textarea{width:100%; padding:15px; border-radius:15px; border:1px solid #ddd; margin-top:10px; font-size:16px;}
        button{background:var(--main); color:#fff; font-weight:800; cursor:pointer; border:none;}
        .hidden{display:none;}
        .admin-grid {display:grid; grid-template-columns: 1fr 1fr; gap:15px;}
        .status-item {background:#f9f9f9; padding:15px; border-radius:15px; margin-top:10px; border-right:5px solid #000;}
        .notif-btn {background:#27ae60; margin-top:10px;}
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img id="siteLogoImg" src="" alt="Logo">
        <h1 id="displaySiteName">TALLAH</h1>
        <span class="verified-badge">✓</span>
    </div>
</header>

<div class="container">
    <div id="loginBox" class="card">
        <h2 id="loginTitle">دخول النظام</h2>
        <input type="text" id="loginInput" placeholder="رقم الهاتف أو كود الإدارة">
        <button onclick="handleLogin()">دخول</button>
    </div>

    <div id="adminPage" class="card hidden">
        <h2>إعدادات الموقع (المالك)</h2>
        <div class="admin-grid">
            <input type="text" id="newSiteName" placeholder="تغيير اسم الموقع">
            <input type="text" id="newLogoUrl" placeholder="رابط اللوجو (URL)">
        </div>
        <button onclick="updateBranding()" style="background:#444;">حفظ التعديلات</button>
        
        <hr style="margin:20px 0;">
        
        <h2>إضافة شحنة يدوياً</h2>
        <input type="text" id="custPhone" placeholder="رقم هاتف العميل">
        <input type="text" id="custName" placeholder="اسم العميل">
        <input type="file" id="custImage" accept="image/*">
        <button onclick="uploadAndSave()" id="saveBtn">حفظ الشحنة (Cloudinary + Firebase)</button>

        <hr style="margin:20px 0;">
        <h2>طلبات التتبع (قيد المراجعة)</h2>
        <div id="pendingList"></div>
        <button onclick="logout()" style="background:#666; margin-top:20px;">خروج</button>
    </div>

    <div id="userPage" class="card hidden">
        <h2>تفاصيل شحنتك</h2>
        <div id="userResult"></div>
        <button onclick="requestNotif()" class="notif-btn">تفعيل إشعارات حالة الشحنة</button>
        <button onclick="logout()" style="background:#666; margin-top:20px;">خروج</button>
    </div>
</div>

<script>
// --- CONFIGURATION ---
const firebaseConfig = {
    apiKey: "AIzaSyAFUX5NmGFR9MLFzjIa-MkBUOk6OMz5Low",
    authDomain: "tatpo-c40ce.firebaseapp.com",
    databaseURL: "https://tatpo-c40ce-default-rtdb.firebaseio.com",
    projectId: "tatpo-c40ce",
    storageBucket: "tatpo-c40ce.appspot.com",
    messagingSenderId: "916778556013",
    appId: "1:916778556013:web:dfdfd7c79fbdf9f334472"
};

const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/YOUR_CLOUD_NAME/image/upload";
const CLOUDINARY_PRESET = "YOUR_UPLOAD_PRESET";

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ADMIN_CODE = "2009257";

// --- SESSION HANDLING (No reset on refresh) ---
window.onload = () => {
    loadBranding();
    const savedUser = localStorage.getItem('tallah_session');
    if(savedUser) {
        document.getElementById('loginInput').value = savedUser;
        handleLogin();
    }
};

function handleLogin() {
    const val = document.getElementById("loginInput").value.trim();
    localStorage.setItem('tallah_session', val);
    
    if(val === ADMIN_CODE) {
        showPage('adminPage');
        loadPending();
    } else {
        fetchShipment(val);
    }
}

function showPage(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function logout() {
    localStorage.removeItem('tallah_session');
    location.reload();
}

// --- BRANDING ---
function updateBranding() {
    const name = document.getElementById('newSiteName').value;
    const logo = document.getElementById('newLogoUrl').value;
    db.ref('settings').set({ name, logo });
    alert("تم التحديث");
}

function loadBranding() {
    db.ref('settings').on('value', s => {
        const data = s.val();
        if(data) {
            document.getElementById('displaySiteName').innerText = data.name || "TALLAH";
            document.getElementById('siteTitleTag').innerText = data.name || "TALLAH";
            if(data.logo) {
                const img = document.getElementById('siteLogoImg');
                img.src = data.logo;
                img.style.display = "block";
            }
        }
    });
}

// --- CLOUDINARY & FIREBASE SAVE ---
async function uploadAndSave() {
    const file = document.getElementById('custImage').files[0];
    const phone = document.getElementById('custPhone').value;
    const name = document.getElementById('custName').value;
    
    if(!file || !phone) return alert("اكمل البيانات");
    
    document.getElementById('saveBtn').innerText = "جاري الرفع...";
    
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', CLOUDINARY_PRESET);

    try {
        const resp = await fetch(CLOUDINARY_URL, { method: 'POST', body: formData });
        const imgData = await resp.json();
        
        await db.ref('shipments/' + phone).set({
            name, phone, image: imgData.secure_url, status: "تم الشحن", lastUpdate: new Date().toLocaleString()
        });
        
        alert("تم الحفظ بنجاح");
        document.getElementById('saveBtn').innerText = "حفظ الشحنة";
    } catch(e) { alert("خطأ في الرفع"); }
}

// --- USER TRACKING ---
function fetchShipment(phone) {
    db.ref('shipments/' + phone).on('value', s => {
        if(s.exists()) {
            showPage('userPage');
            const d = s.val();
            document.getElementById('userResult').innerHTML = `
                <p>الاسم: ${d.name}</p>
                <p>الحالة: <b>${d.status}</b></p>
                <img src="${d.image}" style="width:100%; border-radius:15px; margin-top:10px;">
            `;
        } else {
            // سجل الرقم كطلب مراجعة للمالك
            db.ref('pending/' + phone).set({ phone, time: new Date().toLocaleString() });
            alert("رقمك قيد المراجعة، سيتم إضافة البيانات قريباً.");
        }
    });
}

// --- ADMIN PENDING LOG ---
function loadPending() {
    db.ref('pending').on('value', s => {
        let html = "";
        s.forEach(child => {
            html += `<div class="status-item">رقم حاول التتبع: ${child.val().phone} <br> <small>${child.val().time}</small></div>`;
        });
        document.getElementById('pendingList').innerHTML = html || "لا توجد طلبات جديدة";
    });
}

// --- NOTIFICATIONS ---
function requestNotif() {
    Notification.requestPermission().then(perm => {
        if(perm === 'granted') alert("تم تفعيل الإشعارات بنجاح!");
    });
}
</script>
</body>
</html>
