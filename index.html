<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitleTag">Tallah Smart System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>
        :root { --main: #000; --bg: #f5f1ed; --card: #fff; }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
        body{background:var(--bg); color:#111; min-height:100vh;}
        header{background:var(--main); padding:20px; text-align:center; color:#fff;}
        .logo-container{display:flex; align-items:center; justify-content:center; gap:10px;}
        #siteLogoImg{width:55px; height:55px; border-radius:50%; object-fit: cover; display:none; border:2px solid #fff;}
        .verified-badge{color:#1da1f2; font-size:20px;}
        .container{width:95%; max-width:900px; margin:auto; padding:20px;}
        .card{background:var(--card); padding:25px; border-radius:25px; box-shadow:0 10px 40px rgba(0,0,0,.05); margin-bottom:20px;}
        input, button, textarea{width:100%; padding:15px; border-radius:15px; border:1px solid #ddd; margin-top:10px; font-size:16px; outline:none;}
        button{background:var(--main); color:#fff; font-weight:800; cursor:pointer; border:none; transition:0.3s;}
        button:disabled{background:#ccc;}
        .hidden{display:none;}
        .admin-section{border-top: 1px solid #eee; padding-top:20px; margin-top:20px;}
        .status-item {background:#f9f9f9; padding:15px; border-radius:15px; margin-top:10px; border-right:5px solid #000;}
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img id="siteLogoImg" src="" alt="Logo">
        <h1 id="displaySiteName">TALLAH</h1>
        <span class="verified-badge">✓</span>
    </div>
</header>

<div class="container">
    <div id="loginBox" class="card">
        <h2>دخول النظام</h2>
        <p style="font-size:13px; color:#666;">أدخل رقم الهاتف للتتبع أو كود الإدارة</p>
        <input type="text" id="loginInput" placeholder="01xxxxxxxxx">
        <button onclick="handleLogin()">دخول</button>
    </div>

    <div id="adminPage" class="card hidden">
        <h2>إعدادات الهوية والبراند</h2>
        <input type="text" id="newSiteName" placeholder="اسم الموقع الجديد">
        <p style="margin-top:10px; font-size:14px;">ارفع لوجو الموقع الجديد:</p>
        <input type="file" id="siteLogoFile" accept="image/*">
        <button onclick="updateBranding()" id="brandBtn" style="background:#444;">تحديث الهوية (اسم + لوجو)</button>
        
        <div class="admin-section">
            <h2>إضافة شحنة عميل</h2>
            <input type="text" id="custPhone" placeholder="رقم هاتف العميل">
            <input type="text" id="custName" placeholder="اسم العميل">
            <p style="margin-top:10px; font-size:14px;">صورة المنتج أو البوليصة:</p>
            <input type="file" id="custImage" accept="image/*">
            <button onclick="uploadShipment()" id="saveBtn">حفظ الشحنة في النظام</button>
        </div>

        <div class="admin-section">
            <h2>سجل المراجعة (أرقام بحثت عن شحنتها)</h2>
            <div id="pendingList"></div>
        </div>
        
        <button onclick="logout()" style="background:#666; margin-top:20px;">تسجيل الخروج</button>
    </div>

    <div id="userPage" class="card hidden">
        <div id="userResult"></div>
        <button onclick="requestNotif()" style="background:#27ae60; margin-top:10px;">تفعيل إشعارات خروج الشحنة</button>
        <button onclick="logout()" style="background:#666; margin-top:15px;">خروج</button>
    </div>
</div>

<script>
// --- إعدادات Firebase من صورك ---
const firebaseConfig = {
    apiKey: "AIzaSyAFUX5NmGFR9MLFzjIa-MkBUOk6OMz5Low",
    authDomain: "tatpo-c40ce.firebaseapp.com",
    databaseURL: "https://tatpo-c40ce-default-rtdb.firebaseio.com",
    projectId: "tatpo-c40ce",
    storageBucket: "tatpo-c40ce.appspot.com",
    messagingSenderId: "916778556013",
    appId: "1:916778556013:web:dfdfd7c79fbdf9f334472"
};

// --- إعدادات Cloudinary ---
const CLOUD_NAME = "dfbqpjtvm"; 
const UPLOAD_PRESET = "tatpo-c40ce";

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ADMIN_CODE = "2009257";

// حفظ الجلسة عند Refresh الموقع
window.onload = () => {
    loadBranding();
    const session = localStorage.getItem('tallah_session');
    if(session) {
        document.getElementById('loginInput').value = session;
        handleLogin();
    }
};

function handleLogin() {
    const val = document.getElementById("loginInput").value.trim();
    if(!val) return;
    localStorage.setItem('tallah_session', val);
    
    if(val === ADMIN_CODE) {
        showPage('adminPage');
        loadPendingLog();
    } else {
        checkUserShipment(val);
    }
}

function showPage(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function logout() {
    localStorage.removeItem('tallah_session');
    location.reload();
}

// دالة الرفع العامة لـ Cloudinary
async function uploadToCloudinary(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
        method: 'POST', body: formData
    });
    return await res.json();
}

// تحديث اسم الموقع واللوجو المرفوع
async function updateBranding() {
    const name = document.getElementById('newSiteName').value;
    const file = document.getElementById('siteLogoFile').files[0];
    const btn = document.getElementById('brandBtn');
    
    btn.disabled = true;
    btn.innerText = "جاري التحديث...";

    let logoUrl = "";
    if(file) {
        const data = await uploadToCloudinary(file);
        logoUrl = data.secure_url;
    }

    const updates = {};
    if(name) updates.name = name;
    if(logoUrl) updates.logo = logoUrl;

    db.ref('settings').update(updates).then(() => {
        alert("تم تحديث الهوية بنجاح!");
        btn.disabled = false;
        btn.innerText = "تحديث الهوية (اسم + لوجو)";
    });
}

function loadBranding() {
    db.ref('settings').on('value', s => {
        const d = s.val();
        if(d) {
            if(d.name) {
                document.getElementById('displaySiteName').innerText = d.name;
                document.getElementById('siteTitleTag').innerText = d.name;
            }
            if(d.logo) {
                const img = document.getElementById('siteLogoImg');
                img.src = d.logo; img.style.display = "block";
            }
        }
    });
}

// رفع وحفظ الشحنة
async function uploadShipment() {
    const file = document.getElementById('custImage').files[0];
    const phone = document.getElementById('custPhone').value;
    const name = document.getElementById('custName').value;
    const btn = document.getElementById('saveBtn');

    if(!file || !phone) return alert("يرجى اختيار صورة وإدخال رقم العميل");

    btn.disabled = true;
    btn.innerText = "جاري رفع الشحنة...";

    try {
        const data = await uploadToCloudinary(file);
        await db.ref('shipments/' + phone).set({
            name, image: data.secure_url, status: "تم التجهيز - قيد الشحن", time: new Date().toLocaleString()
        });
        alert("تم حفظ بيانات العميل بنجاح!");
    } catch(e) { alert("حدث خطأ في الرفع"); }
    
    btn.disabled = false;
    btn.innerText = "حفظ الشحنة في النظام";
}

function checkUserShipment(phone) {
    db.ref('shipments/' + phone).on('value', s => {
        if(s.exists()) {
            showPage('userPage');
            const d = s.val();
            document.getElementById('userResult').innerHTML = `
                <h2>مرحباً، ${d.name}</h2>
                <p style="margin:10px 0;">حالة شحنتك: <b style="color:green;">${d.status}</b></p>
                <img src="${d.image}" style="width:100%; border-radius:15px; border:1px solid #eee;">
                <p style="font-size:12px; color:#999; margin-top:10px;">آخر تحديث: ${d.time}</p>
            `;
        } else {
            db.ref('logs/' + phone).set({ phone, time: new Date().toLocaleString() });
            alert("عفواً، لا توجد شحنة مسجلة لهذا الرقم. تم إبلاغ المالك للمراجعة.");
        }
    });
}

function loadPendingLog() {
    db.ref('logs').on('value', s => {
        let html = "";
        s.forEach(child => {
            html += `<div class="status-item">رقم بحث عن شحنته: ${child.val().phone} <br> <small>التوقيت: ${child.val().time}</small></div>`;
        });
        document.getElementById('pendingList').innerHTML = html || "لا توجد عمليات بحث جديدة";
    });
}

function requestNotif() {
    Notification.requestPermission().then(p => {
        if(p === 'granted') alert("تم تفعيل الإشعارات! ستصلك رسالة عند خروج الشحنة.");
    });
}
</script>
</body>
</html>
