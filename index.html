<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tallah Smart System | نظام طلة للأتمتة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root { --main: #000; --bg: #f5f1ed; --card: #fff; }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
        body{background:var(--bg); color:#111; min-height:100vh;}
        header{background:var(--main); padding:30px; text-align:center; color:#fff; box-shadow:0 10px 30px rgba(0,0,0,.15);}
        .logo{font-size:50px; font-weight:900; letter-spacing:4px;}
        .container{width:95%; max-width:900px; margin:auto; padding:20px;}
        .card{background:var(--card); padding:35px; border-radius:30px; box-shadow:0 10px 40px rgba(0,0,0,.05); margin-bottom:20px; border: 1px solid #eee;}
        .title{font-size:28px; font-weight:900; margin-bottom:20px; border-right:6px solid var(--main); padding-right:15px;}
        input, select, button, textarea{width:100%; padding:18px; border-radius:18px; border:1px solid #ddd; margin-top:12px; font-size:17px; outline:none; transition: 0.3s;}
        input:focus{border-color: var(--main); background: #fdfdfd;}
        button{background:var(--main); color:#fff; font-weight:800; cursor:pointer; border:none;}
        button:hover{opacity:0.8; transform:translateY(-2px);}
        .hidden{display:none;}
        .pdf-area{background:#f9f9f9; border:2px dashed #ccc; padding:30px; border-radius:25px; text-align:center; margin-top:20px;}
        .log-screen{background:#111; color:#0f0; padding:20px; border-radius:20px; height:200px; overflow-y:auto; font-family:monospace; font-size:13px; margin-top:15px; direction:ltr; text-align:left; border: 5px solid #222;}
        .success-text{color:#27ae60; font-weight:bold;}
        .status-badge{display:inline-block; padding:10px 20px; border-radius:15px; background:#000; color:#fff; font-weight:bold; margin-top:15px;}
    </style>
</head>
<body>

<header>
    <div class="logo">TALLAH</div>
    <p>النظام الذكي لمعالجة بوالص ABS واستخراج البيانات</p>
</header>

<div class="container">
    <div id="loginBox" class="card">
        <div class="title">دخول النظام</div>
        <p style="margin-bottom:10px; color:#666;">أدخل رقم الهاتف للتتبع أو كود المالك للإدارة</p>
        <input type="text" id="loginInput" placeholder="رقم الهاتف أو كود الإدارة">
        <button onclick="handleLogin()">دخول</button>
    </div>

    <div id="adminPage" class="card hidden">
        <div class="title">لوحة التحكم والأتمتة</div>
        <p style="font-size:14px; color:#666;">ارفع ملف الـ PDF الخاص بشركة ABS، وسيقوم النظام بسحب (الاسم، الرقم، السعر) تلقائياً.</p>
        
        <div class="pdf-area">
            <input type="file" id="pdfFile" accept=".pdf">
            <button onclick="startAutoProcess()" style="background:#27ae60; margin-top:20px;">بدء الاستخراج والحفظ في Firebase</button>
        </div>

        <div id="processLog" class="log-screen">نظام المعالجة جاهز...</div>
        
        <button onclick="location.reload()" style="background:#666; margin-top:25px;">تسجيل الخروج</button>
    </div>

    <div id="userPage" class="card hidden">
        <div class="title">بيانات الشحنة</div>
        <div id="userResult"></div>
        <button onclick="location.reload()" style="background:#666; margin-top:25px;">رجوع للرئيسية</button>
    </div>
</div>

<script>
// إعدادات Firebase الخاصة بمشروعك tatpo-c40ce
const firebaseConfig = {
    apiKey: "AIzaSyAFUX5NmGFR9MLFzjIa-MkBUOk6OMz5Low",
    authDomain: "tatpo-c40ce.firebaseapp.com",
    databaseURL: "https://tatpo-c40ce-default-rtdb.firebaseio.com",
    projectId: "tatpo-c40ce",
    storageBucket: "tatpo-c40ce.appspot.com",
    messagingSenderId: "916778556013",
    appId: "1:916778556013:web:dfdfd7c79fbdf9f334472"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ADMIN_CODE = "2009257"; // كود الإدارة الخاص بك
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

function handleLogin() {
    const val = document.getElementById("loginInput").value.trim();
    if(val === ADMIN_CODE) {
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("adminPage").classList.remove("hidden");
    } else if(val !== "") {
        checkStatus(val);
    } else {
        alert("يرجى إدخال بيانات صحيحة");
    }
}

function checkStatus(phone) {
    db.ref("shipments/" + phone).once("value").then(snapshot => {
        if(snapshot.exists()) {
            const d = snapshot.val();
            document.getElementById("loginBox").classList.add("hidden");
            document.getElementById("userPage").classList.remove("hidden");
            document.getElementById("userResult").innerHTML = `
                <div style="line-height:2.2;">
                    <p><b>اسم العميل:</b> ${d.name}</p>
                    <p><b>قيمة الطلب (COD):</b> ${d.price} ج.م</p>
                    <p><b>التفاصيل:</b> ${d.details || 'بوليصة شحن ABS'}</p>
                    <div class="status-badge">حالة الشحنة: ${d.status}</div>
                    <p style="font-size:13px; color:#888; margin-top:15px;">آخر تحديث تلقائي: ${d.lastUpdate}</p>
                </div>`;
        } else { 
            alert("عفواً، لا توجد شحنة مسجلة لهذا الرقم في قاعدة بيانات طلة."); 
        }
    });
}

async function startAutoProcess() {
    const fileInput = document.getElementById("pdfFile");
    const log = document.getElementById("processLog");
    if(!fileInput.files[0]) return alert("يرجى اختيار ملف بوالص ABS أولاً");

    log.innerHTML = "> يتم الآن فحص ملف شركة ABS...<br>";
    const file = fileInput.files[0];
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument(arrayBuffer).promise;
    
    log.innerHTML += `> تم العثور على ${pdf.numPages} صفحة/بوليصة.<br>`;

    for(let i=1; i<=pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const textContent = await page.getTextContent();
        const textItems = textContent.items.map(item => item.str);
        const fullText = textItems.join(" ");

        // استخراج البيانات بناءً على تنسيق ABS المرفق في صورتك
        const phoneMatch = fullText.match(/01[0125][0-9]{8}/);
        const phone = phoneMatch ? phoneMatch[0] : null;

        // استخراج السعر بجانب كلمة COD
        const priceMatch = fullText.match(/COD\s*(\d+)/i) || fullText.match(/(\d{2,4})\s*750/);
        const price = priceMatch ? priceMatch[1] : "750"; // افتراضي بناءً على صورتك

        // استخراج الاسم بعد To:
        const nameMatch = fullText.match(/To\s*:\s*([\u0600-\u06FF\s]+)/);
        const name = nameMatch ? nameMatch[1].trim() : "عميل طلة";

        if(phone) {
            log.innerHTML += `> معالجة: <span class="success-text">${name}</span> | هاتف: ${phone}<br>`;
            
            // الحفظ في عقدة shipments داخل Firebase
            await db.ref("shipments/" + phone).update({
                name: name,
                price: price,
                status: "تم التأكيد في شركة الشحن (ABS)",
                details: "تم سحب البيانات تلقائياً من البوليصة",
                lastUpdate: new Date().toLocaleString('ar-EG')
            });
        }
    }
    log.innerHTML += "> <span class='success-text'>✓ تمت المعالجة والحفظ بنجاح!</span>";
    alert("اكتملت العملية. يمكن للعملاء الآن التتبع.");
}
</script>
</body>
</html>
