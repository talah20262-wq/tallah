<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="siteTitleTag">Tallah Smart System</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>

    <style>
        :root { --main: #000; --bg: #f5f1ed; --card: #fff; --accent: #1da1f2; --danger: #e74c3c; }
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Cairo',sans-serif;}
        body{background:var(--bg); color:#111; min-height:100vh;}
        header{background:var(--main); padding:20px; text-align:center; color:#fff;}
        .logo-container{display:flex; align-items:center; justify-content:center; gap:10px;}
        #siteLogoImg{width:55px; height:55px; border-radius:50%; object-fit: cover; display:none; border:2px solid #fff;}
        .verified-badge{color:var(--accent); font-size:20px;}
        .container{width:95%; max-width:1000px; margin:auto; padding:20px;}
        .card{background:var(--card); padding:25px; border-radius:25px; box-shadow:0 10px 40px rgba(0,0,0,.05); margin-bottom:20px;}
        input, button, select, textarea{width:100%; padding:15px; border-radius:15px; border:1px solid #ddd; margin-top:10px; font-size:16px; outline:none;}
        button{background:var(--main); color:#fff; font-weight:800; cursor:pointer; border:none; transition:0.3s;}
        button:hover{opacity:0.8;}
        .hidden{display:none;}
        .admin-section{border-top: 2px dashed #eee; padding-top:20px; margin-top:25px;}
        .status-item {background:#f9f9f9; padding:15px; border-radius:15px; margin-top:10px; border-right:5px solid var(--main);}
        
        /* جدول الإدارة */
        .table-container {overflow-x: auto; margin-top: 15px;}
        table {width: 100%; border-collapse: collapse; background: #fff; border-radius: 15px; overflow: hidden;}
        th, td {padding: 15px; text-align: right; border-bottom: 1px solid #eee; font-size: 14px;}
        th {background: #f8f8f8; font-weight: 900;}
        .btn-sm {padding: 8px 12px; font-size: 12px; width: auto; margin: 2px;}
        .btn-danger {background: var(--danger);}
        .btn-edit {background: var(--accent);}
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <img id="siteLogoImg" src="" alt="Logo">
        <h1 id="displaySiteName">TALLAH</h1>
        <span class="verified-badge">✓</span>
    </div>
</header>

<div class="container">
    <div id="loginBox" class="card">
        <h2>دخول النظام</h2>
        <input type="text" id="loginInput" placeholder="أدخل رقم الهاتف">
        <button onclick="handleLogin()">دخول</button>
    </div>

    <div id="adminPage" class="card hidden">
        <h2>إعدادات الموقع والهوية</h2>
        <input type="text" id="newSiteName" placeholder="تغيير اسم البراند">
        <input type="file" id="siteLogoFile" accept="image/*">
        <button onclick="updateBranding()" id="brandBtn" style="background:#444;">حفظ تغييرات الهوية</button>
        
        <div class="admin-section">
            <h2>إضافة شحنة جديدة</h2>
            <input type="text" id="custPhone" placeholder="رقم هاتف العميل">
            <input type="text" id="custName" placeholder="اسم العميل">
            <select id="shipmentStatus">
                <option value="قيد التجهيز في المصنع">قيد التجهيز في المصنع</option>
                <option value="خرجت الشحنة مع المندوب">خرجت الشحنة مع المندوب</option>
                <option value="تم التسليم بنجاح">تم التسليم بنجاح</option>
            </select>
            <input type="file" id="custImage" accept="image/*">
            <button onclick="uploadShipment()" id="saveBtn">حفظ الشحنة</button>
        </div>

        <div class="admin-section">
            <button onclick="toggleManager()" style="background:#2ecc71;">إدارة الشحنات المسجلة (عرض/إخفاء)</button>
            <div id="managerBox" class="hidden">
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>الاسم</th>
                                <th>الرقم</th>
                                <th>الحالة</th>
                                <th>الإجراءات</th>
                            </tr>
                        </thead>
                        <tbody id="shipmentsTableBody">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="admin-section">
            <h2>طلبات بحث جديدة</h2>
            <div id="pendingList"></div>
        </div>
        
        <button onclick="logout()" style="background:#666; margin-top:20px;">خروج</button>
    </div>

    <div id="userPage" class="card hidden">
        <div id="userResult"></div>
        <button onclick="requestNotif()" style="background:#27ae60; margin-top:10px;">تفعيل الإشعارات</button>
        <button onclick="logout()" style="background:#666; margin-top:15px;">خروج</button>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAFUX5NmGFR9MLFzjIa-MkBUOk6OMz5Low",
    authDomain: "tatpo-c40ce.firebaseapp.com",
    databaseURL: "https://tatpo-c40ce-default-rtdb.firebaseio.com",
    projectId: "tatpo-c40ce",
    storageBucket: "tatpo-c40ce.appspot.com",
    messagingSenderId: "916778556013",
    appId: "1:916778556013:web:dfdfd7c79fbdf9f334472"
};

const CLOUD_NAME = "dfbqpjtvm"; 
const UPLOAD_PRESET = "tatpo-c40ce";

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const ADMIN_CODE = "2009257";

window.onload = () => {
    loadBranding();
    const session = localStorage.getItem('tallah_session');
    if(session) {
        document.getElementById('loginInput').value = session;
        handleLogin();
    }
};

function handleLogin() {
    const val = document.getElementById("loginInput").value.trim();
    if(!val) return;
    localStorage.setItem('tallah_session', val);
    if(val === ADMIN_CODE) {
        showPage('adminPage');
        loadPendingLog();
        loadShipmentsToManager(); // تحميل البيانات للإدارة
    } else {
        checkUserShipment(val);
    }
}

function showPage(id) {
    document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
    document.getElementById(id).classList.remove('hidden');
}

function logout() {
    localStorage.removeItem('tallah_session');
    location.reload();
}

async function uploadToCloudinary(file) {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', UPLOAD_PRESET);
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
        method: 'POST', body: formData
    });
    return await res.json();
}

// تعديل الهوية
async function updateBranding() {
    const name = document.getElementById('newSiteName').value;
    const file = document.getElementById('siteLogoFile').files[0];
    const btn = document.getElementById('brandBtn');
    btn.innerText = "جاري الحفظ...";
    let logoUrl = "";
    if(file) {
        const data = await uploadToCloudinary(file);
        logoUrl = data.secure_url;
    }
    const updates = {};
    if(name) updates.name = name;
    if(logoUrl) updates.logo = logoUrl;
    db.ref('settings').update(updates).then(() => { alert("تم التحديث"); btn.innerText = "حفظ تغييرات الهوية"; });
}

function loadBranding() {
    db.ref('settings').on('value', s => {
        const d = s.val();
        if(d) {
            if(d.name) document.getElementById('displaySiteName').innerText = d.name;
            if(d.logo) { document.getElementById('siteLogoImg').src = d.logo; document.getElementById('siteLogoImg').style.display = "block"; }
        }
    });
}

// رفع شحنة
async function uploadShipment() {
    const file = document.getElementById('custImage').files[0];
    const phone = document.getElementById('custPhone').value.trim();
    const name = document.getElementById('custName').value;
    const status = document.getElementById('shipmentStatus').value;
    if(!phone) return alert("الرقم مطلوب");
    
    let imageUrl = "";
    if(file) {
        const data = await uploadToCloudinary(file);
        imageUrl = data.secure_url;
    }
    const data = { name, status, time: new Date().toLocaleString() };
    if(imageUrl) data.image = imageUrl;

    db.ref('shipments/' + phone).update(data).then(() => alert("تم الحفظ"));
}

// --- وظائف الإدارة الجديدة ---
function toggleManager() {
    document.getElementById('managerBox').classList.toggle('hidden');
}

function loadShipmentsToManager() {
    db.ref('shipments').on('value', s => {
        const tbody = document.getElementById('shipmentsTableBody');
        tbody.innerHTML = "";
        s.forEach(child => {
            const val = child.val();
            const key = child.key; // الرقم هو المفتاح
            tbody.innerHTML += `
                <tr>
                    <td>${val.name || 'بدون اسم'}</td>
                    <td>${key}</td>
                    <td><b>${val.status}</b></td>
                    <td>
                        <button class="btn-sm btn-edit" onclick="quickUpdate('${key}', '${val.status}')">تحديث</button>
                        <button class="btn-sm btn-danger" onclick="deleteShipment('${key}')">حذف</button>
                    </td>
                </tr>
            `;
        });
    });
}

function quickUpdate(phone, currentStatus) {
    const newStatus = prompt("أدخل الحالة الجديدة:", currentStatus);
    if(newStatus) {
        db.ref('shipments/' + phone).update({ 
            status: newStatus,
            time: new Date().toLocaleString() 
        });
    }
}

function deleteShipment(phone) {
    if(confirm("هل أنت متأكد من حذف هذه الشحنة نهائياً؟")) {
        db.ref('shipments/' + phone).remove();
    }
}

// عرض العميل
function checkUserShipment(phone) {
    db.ref('shipments/' + phone).on('value', s => {
        if(s.exists()) {
            showPage('userPage');
            const d = s.val();
            document.getElementById('userResult').innerHTML = `
                <h2>مرحباً، ${d.name}</h2>
                <p>الحالة: <b>${d.status}</b></p>
                ${d.image ? `<img src="${d.image}" style="width:100%; border-radius:15px; margin-top:10px;">` : ''}
            `;
        } else {
            db.ref('logs/' + phone).set({ phone, time: new Date().toLocaleString() });
            alert("غير مسجل.");
        }
    });
}

function loadPendingLog() {
    db.ref('logs').on('value', s => {
        let html = "";
        s.forEach(child => { html += `<div class="status-item">بحث: ${child.val().phone}</div>`; });
        document.getElementById('pendingList').innerHTML = html;
    });
}

function requestNotif() {
    Notification.requestPermission();
}
</script>
</body>
</html>
